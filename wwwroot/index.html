<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#03173d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InventoryPlus" />
    <meta name="description" content="Smart inventory & POS system for small businesses" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>InventoryPlus</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="InventoryPlus.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        // Theme initialization
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        
        window.themeInterop = {
            toggle: function(isLight) {
                if (isLight) {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                }
            },
            isLight: function() {
                return document.documentElement.getAttribute('data-theme') === 'light';
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div class="initial-loader">
            <div class="loader-pulse"></div>
            <div>Loading InventoryPlus...</div>
        </div>
    </div>

    <!-- PWA Install Banner -->
    <div id="pwa-install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:0.85rem 1.25rem;align-items:center;justify-content:space-between;gap:0.75rem;font-family:'Outfit',sans-serif;box-shadow:0 -4px 20px rgba(0,0,0,0.3)">
        <div style="display:flex;align-items:center;gap:0.6rem;flex:1;min-width:0">
            <span style="font-size:1.4rem">📲</span>
            <span style="font-size:0.9rem;font-weight:500">Install InventoryPlus for quick access</span>
        </div>
        <button onclick="window.pwaInstall.prompt()" style="background:#fff;color:#4f46e5;border:none;padding:0.5rem 1rem;border-radius:8px;font-weight:700;font-size:0.85rem;cursor:pointer;white-space:nowrap;font-family:inherit">Install</button>
        <button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:1.2rem;cursor:pointer;padding:0.25rem">&times;</button>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Restore redirected path from 404.html for SPA routing on GitHub Pages
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== '/') {
                // 404.html strips the /InventoryPlus prefix, so add it back before replaceState
                history.replaceState(null, null, '/InventoryPlus' + redirect);
            }
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // CSV export interop
        window.downloadCsv = function(filename, csvContent) {
            var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        };
    </script>
    <!-- <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script> -->
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                .then(reg => {
                    console.info('SW registered:', reg.scope);
                    // Check for updates periodically
                    setInterval(() => reg.update(), 60 * 60 * 1000);
                })
                .catch(err => console.warn('SW registration failed:', err));
        }

        // PWA Install Prompt
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            const banner = document.getElementById('pwa-install-banner');
            if (banner) banner.style.display = 'flex';
        });
        window.pwaInstall = {
            prompt: async function () {
                if (!deferredPrompt) return false;
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                deferredPrompt = null;
                const banner = document.getElementById('pwa-install-banner');
                if (banner) banner.style.display = 'none';
                return result.outcome === 'accepted';
            },
            canInstall: function () { return !!deferredPrompt; }
        };
    </script>
</body>

</html>
