<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#03173d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InventoryPlus" />
    <meta name="description" content="Smart inventory & POS system for small businesses" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>InventoryPlus</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="InventoryPlus.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        // Theme initialization
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        
        window.themeInterop = {
            toggle: function(isLight) {
                if (isLight) {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'dark');
                }
            },
            isLight: function() {
                return document.documentElement.getAttribute('data-theme') === 'light';
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div class="initial-loader">
            <div class="loader-pulse"></div>
            <div>Loading InventoryPlus...</div>
        </div>
    </div>

    <!-- PWA Install Banner — compact top-right toast -->
    <div id="pwa-install-banner" style="display:none;position:fixed;top:0.75rem;right:0.75rem;z-index:9998;background:var(--bg-surface,rgba(25,28,41,0.95));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#f0f2f8;padding:0.5rem 0.75rem;border-radius:10px;align-items:center;gap:0.5rem;font-family:'Outfit',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.08);max-width:320px">
        <i class="fa-solid fa-download" style="font-size:0.95rem;color:#6366f1;flex-shrink:0"></i>
        <span style="font-size:0.8rem;font-weight:500;white-space:nowrap">Install for offline access</span>
        <button onclick="window.pwaInstall.prompt()" style="background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;padding:0.3rem 0.7rem;border-radius:6px;font-weight:600;font-size:0.75rem;cursor:pointer;white-space:nowrap;font-family:inherit">Install</button>
        <button onclick="this.parentElement.style.display='none';sessionStorage.setItem('pwa-dismissed','1')" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:1rem;cursor:pointer;padding:0.15rem;line-height:1">&times;</button>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Restore redirected path from 404.html for SPA routing on GitHub Pages
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== '/') {
                // 404.html strips the /InventoryPlus prefix, so add it back before replaceState
                history.replaceState(null, null, '/InventoryPlus' + redirect);
            }
        })();
    </script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // Boot Blazor with error logging
        Blazor.start().catch(err => console.error('Blazor boot error:', err));

        // Log unhandled .NET errors to console for debugging
        window.addEventListener('error', e => console.error('Global error:', e.error || e.message));
        window.addEventListener('unhandledrejection', e => console.error('Unhandled promise:', e.reason));
    </script>
    <script>
        // CSV export interop
        window.downloadCsv = function(filename, csvContent) {
            var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        };
    </script>
    <!-- <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script> -->
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                .then(reg => {
                    console.info('SW registered:', reg.scope);
                    // Check for updates periodically
                    setInterval(() => reg.update(), 60 * 60 * 1000);
                })
                .catch(err => console.warn('SW registration failed:', err));
        }

        // PWA Install Prompt
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            // Don't show if user previously dismissed in this session
            if (sessionStorage.getItem('pwa-dismissed') === '1') return;
            const banner = document.getElementById('pwa-install-banner');
            if (banner) banner.style.display = 'flex';
        });
        window.pwaInstall = {
            prompt: async function () {
                if (!deferredPrompt) return false;
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                deferredPrompt = null;
                const banner = document.getElementById('pwa-install-banner');
                if (banner) banner.style.display = 'none';
                return result.outcome === 'accepted';
            },
            canInstall: function () { return !!deferredPrompt; }
        };
    </script>
    <script src="_content/BlazorStrap/blazorstrap.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>

</html>
