<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>InventoryPlus</title>
    <script>
        // Redirect to the app root, preserving the path for SPA routing
        var repo = '/InventoryPlus';
        var path = window.location.pathname;
        var search = window.location.search;
        if (path.startsWith(repo)) {
            path = path.slice(repo.length) || '/';
        }
        sessionStorage.redirect = path + search;
        window.location.replace(repo + '/');
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
