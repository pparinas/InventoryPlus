name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish InventoryPlus.csproj -c Release -o publish

      - name: Create non-fingerprinted blazor.webassembly.js
        run: |
          find publish/wwwroot/_framework -maxdepth 1 \
            -name 'blazor.webassembly.*.js' \
            ! -name '*.gz' ! -name '*.br' \
            -exec cp {} publish/wwwroot/_framework/blazor.webassembly.js \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: negosyo360
          directory: publish/wwwroot
