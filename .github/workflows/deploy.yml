name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish InventoryPlus.csproj -c Release -o publish

      - name: Inject Supabase secrets
        run: |
          sed -i 's|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g' publish/wwwroot/appsettings.json
          sed -i 's|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g' publish/wwwroot/appsettings.json

      - name: Create non-fingerprinted entry file for static hosting
        run: |
          find publish/wwwroot/_framework -maxdepth 1 \
            -name 'blazor.webassembly.*.js' \
            ! -name '*.gz' ! -name '*.br' \
            -exec cp {} publish/wwwroot/_framework/blazor.webassembly.js \;

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish/wwwroot --project-name=negosyo360 --commit-dirty=true
