name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish InventoryPlus.csproj -c Release -o publish

      - name: Inject Supabase secrets
        run: |
          sed -i 's|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g' publish/wwwroot/appsettings.json
          sed -i 's|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g' publish/wwwroot/appsettings.json

      - name: Disable Jekyll (allow _framework folder to be served)
        run: touch publish/wwwroot/.nojekyll

      - name: Create non-fingerprinted entry file for static hosting
        run: |
          find publish/wwwroot/_framework -maxdepth 1 \
            -name 'blazor.webassembly.*.js' \
            ! -name '*.gz' ! -name '*.br' \
            -exec cp {} publish/wwwroot/_framework/blazor.webassembly.js \;

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
